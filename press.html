<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Press – Mariela Ganova Design</title>
<link href="https://fonts.googleapis.com/css2?family=Abel&display=swap" rel="stylesheet">

<style>
/* --- Общ стил --- */
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: 'Abel', sans-serif;
  overflow-x: hidden;
  cursor: none; /* Скриваме стандартния курсор */
}

header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: space-between;
  padding: 1rem 2rem;
  align-items: center;
  z-index: 1000;
}

.logo {
  width: 40px;
  height: 40px;
  background-color: #444;
  border-radius: 50%;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.menu-toggle {
  width: 25px;
  height: 15px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  cursor: pointer;
}

.menu-toggle span {
  background-color: #ccc;
  height: 2px;
  width: 100%;
  display: block;
  transition: all 0.3s ease;
}

.menu-toggle.active span:nth-child(1) {
  transform: rotate(45deg) translate(5px, 5px);
}
.menu-toggle.active span:nth-child(2) {
  opacity: 0;
}
.menu-toggle.active span:nth-child(3) {
  transform: rotate(-45deg) translate(6px, -6px);
}

.menu {
  display: none;
  position: absolute;
  top: 60px;
  right: 2rem;
  background-color: rgba(0,0,0,0.9);
  border: 1px solid #333;
  padding: 1rem;
  z-index: 999;
}

.menu a {
  display: block;
  color: #ccc;
  text-decoration: none;
  margin-bottom: 0.5rem;
  font-size: 0.9rem;
}

.menu a:hover {
  color: #fff;
}

/* --- Централна галерия --- */
.carousel-wrapper {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.carousel {
  position: relative;
  width: 100%;
  height: 33vh; 
  overflow: hidden;
}

.carousel-track {
  display: flex;
  transition: transform 0.1s linear;
}

.carousel-item {
  flex: 0 0 auto;
  margin: 0 1rem;
  text-align: center;
}

.carousel-item img {
  height: 100%;
  transition: opacity 0.4s ease, transform 0.3s ease;
  cursor: pointer;
  display: block;
}

.carousel-item img.color {
  position: absolute;
  top: 0;
  left: 0;
  opacity: 0;
}

.carousel-item:hover img.color {
  opacity: 1;
}

.carousel-item-inner {
  position: relative;
  display: inline-block;
}

.caption {
  margin-top: 0.5rem;
  font-size: 0.9rem;
  color: #ccc;
}

/* --- Мобилна версия --- */
@media (max-width: 900px) {
  .carousel-wrapper {
    height: auto;
    padding: 60px 0;
  }
  .carousel {
    height: 50vh;
  }
  .carousel-item {
    margin: 0 0.5rem;
  }
}

/* --- Курсор с логото --- */
.cursor-logo {
  position: fixed;
  top: 0;
  left: 0;
  width: 50px;
  height: 50px;
  pointer-events: none;
  border-radius: 50%;
  overflow: hidden;
  z-index: 2000;
  transform: translate(-50%, -50%);
  transition: transform 0.05s linear;
}

.cursor-logo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo"><img src="logo.png" alt="Logo"></a>
  <div class="menu-toggle" onclick="toggleMenu()">
    <span></span>
    <span></span>
    <span></span>
  </div>
</header>

<div class="menu" id="menu">
  <a href="index.html">0.1 HOMEPAGE</a>
  <a href="about.html">0.2 ABOUT</a>
  <a href="interiors.html">0.3 INTERIORS</a>
  <a href="exteriors.html">0.4 EXTERIORS</a>
  <a href="mara-studio.html">0.5 MARA studio</a>
  <a href="price.html">0.6 PRICE</a>
  <a href="management.html">0.7 MANAGEMENT & SUPPORT</a>
  <a href="awards-press.html">0.8 AWARDS & PRESS</a>
  <a href="contact.html">0.9 CONTACT</a>
</div>

<div class="carousel-wrapper">
  <div class="carousel" id="carousel">
    <div class="carousel-track" id="carouselTrack">
      <!-- Примерни публикации -->
      <div class="carousel-item">
        <a href="publication1.html">
          <div class="carousel-item-inner">
            <img src="img1-bw.jpg" alt="Publication 1">
            <img src="img1-color.jpg" class="color" alt="Publication 1">
          </div>
        </a>
        <div class="caption">Publication 1</div>
      </div>
      <div class="carousel-item">
        <a href="publication2.html">
          <div class="carousel-item-inner">
            <img src="img2-bw.jpg" alt="Publication 2">
            <img src="img2-color.jpg" class="color" alt="Publication 2">
          </div>
        </a>
        <div class="caption">Publication 2</div>
      </div>
      <div class="carousel-item">
        <a href="publication3.html">
          <div class="carousel-item-inner">
            <img src="img3-bw.jpg" alt="Publication 3">
            <img src="img3-color.jpg" class="color" alt="Publication 3">
          </div>
        </a>
        <div class="caption">Publication 3</div>
      </div>
      <!-- Добави останалите по същия начин -->
    </div>
  </div>
</div>

<!-- Курсор с логото -->
<div class="cursor-logo"><img src="logo.png" alt="Cursor Logo"></div>

<script>
// Меню
function toggleMenu() {
  const menu = document.getElementById('menu');
  const toggle = document.querySelector('.menu-toggle');
  menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
  toggle.classList.toggle('active');
}

// Carousel движение
const track = document.getElementById('carouselTrack');
const carousel = document.getElementById('carousel');
let offset = 0;
let direction = 0;
let animationId;

function animate() {
  offset += direction * 0.5; // скорост
  track.style.transform = `translateX(${offset}px)`;
  animationId = requestAnimationFrame(animate);
}

carousel.addEventListener('mousemove', (e) => {
  const rect = carousel.getBoundingClientRect();
  const x = e.clientX - rect.left;
  if (x < rect.width / 2) {
    direction = 1; // наляво
    if (!animationId) animate();
  } else {
    direction = -1; // надясно
    if (!animationId) animate();
  }
});

carousel.addEventListener('mouseleave', () => {
  direction = 0;
  cancelAnimationFrame(animationId);
  animationId = null;
});

// Следване на мишката с логото
const cursor = document.querySelector('.cursor-logo');
document.addEventListener('mousemove', e => {
  cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%, -50%)`;
});
</script>

</body>
</html>
